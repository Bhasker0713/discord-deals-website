<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Deals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; }
    header { background: white; border-bottom: 1px solid #e5e5e5; padding: 1.5rem 2rem; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    .subtitle { color: #666; font-size: 0.85rem; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; overflow: hidden; display: flex; flex-direction: column; }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
    .card-desc { font-size: 0.85rem; color: #555; line-height: 1.6; flex: 1; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid #f0f0f0; margin-top: auto; }
    .author { font-size: 0.8rem; color: #888; }
    .link { font-size: 0.8rem; color: #5865F2; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .time { font-size: 0.75rem; color: #aaa; }
    .empty { text-align: center; padding: 4rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 71 55" fill="none" aria-hidden="true">
    <path d="M60.1 4.9A58.5 58.5 0 0 0 45.5.7a40.7 40.7 0 0 0-1.8 3.6 54.2 54.2 0 0 0-16.3 0A40.7 40.7 0 0 0 25.6.7 58.4 58.4 0 0 0 11 4.9C1.6 18.7-1 32.2.3 45.5a58.9 58.9 0 0 0 17.9 9 44.2 44.2 0 0 0 3.8-6.2 38.4 38.4 0 0 1-6-2.9l1.5-1.1a42 42 0 0 0 35.9 0l1.5 1.1a38.4 38.4 0 0 1-6 2.9 44.2 44.2 0 0 0 3.8 6.2 58.7 58.7 0 0 0 17.9-9C72 30.3 68.2 16.9 60.1 4.9ZM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2Z" fill="#5865F2"/>
  </svg>
  <div>
    <h1>Community Deals</h1>
    <p class="subtitle">Latest deals from our Discord server</p>
  </div>
</header>

<div class="container">
  <div class="grid" id="dealsGrid">
    <div class="empty">Loading deals...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://lfghsqbldpyodnenpbnu.supabase.co";    // Replace this
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZ2hzcWJsZHB5b2RuZW5wYm51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTIxMjIsImV4cCI6MjA5NTAyODEyMn0.xGrz9zs8R_b3GESuDfcAoG5P1IjxDphdAv6e0bx8NOQ"; // Replace this

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 3600) return Math.floor(diff / 60) + "m ago";
    if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
    return Math.floor(diff / 86400) + "d ago";
  }

  async function loadDeals() {
    const { data, error } = await supabase
      .from("deals")
      .select("*")
      .order("posted_at", { ascending: false })
      .limit(50);

    const grid = document.getElementById("dealsGrid");

    if (error || !data?.length) {
      grid.innerHTML = '<div class="empty">No deals posted yet. Be the first to share one in Discord!</div>';
      return;
    }

    grid.innerHTML = data.map(deal => `
      <div class="card">
        ${deal.image_url ? `<img src="${deal.image_url}" alt="Deal image" />` : ""}
        <div class="card-body">
          <p class="card-title">${deal.title}</p>
          <p class="card-desc">${deal.description}</p>
          <div class="card-footer">
            <span class="author">@${deal.author} · <span class="time">${timeAgo(deal.posted_at)}</span></span>
            ${deal.discord_link ? `<a class="link" href="${deal.discord_link}" target="_blank">View in Discord →</a>` : ""}
          </div>
        </div>
      </div>
    `).join("");
  }

  loadDeals();
  // Auto-refresh every 60 seconds
  setInterval(loadDeals, 60000);
</script>

</body>
</html>
