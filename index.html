<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Save Your Dollar — Best Deals Today</title>
  <meta name="description" content="Best daily deals from Home Depot, Walmart, Amazon, Target, Gap, Chick-fil-A and more."/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#1d7a45;--green-d:#165e34;--green-lt:#eaf5ef;
      --red:#c92000;--red-lt:#fff1ee;--gold:#f5a200;
      --bg:#f5f4f0;--surface:#fff;--border:#e6e3dc;
      --text:#1b1b18;--muted:#86837c;--radius:10px;
    }
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}

    /* Header */
    header{background:var(--green);height:56px;display:flex;align-items:center;
      justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;
      box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-text{font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:-.03em}
    .logo-dot{color:var(--gold)}
    .header-meta{font-size:11px;color:rgba(255,255,255,.55)}

    /* Category bar */
    .catbar{background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:2px;padding:0 1rem;
      overflow-x:auto;scrollbar-width:none;height:50px}
    .catbar::-webkit-scrollbar{display:none}
    .cat-btn{flex-shrink:0;padding:6px 18px;border-radius:20px;font-size:13px;
      font-weight:600;border:none;background:transparent;color:var(--muted);
      cursor:pointer;white-space:nowrap;transition:all .12s}
    .cat-btn:hover{background:var(--bg);color:var(--text)}
    .cat-btn.active{background:var(--green);color:#fff}

    /* Store pills */
    .storebar{background:var(--bg);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;padding:7px 1.25rem;
      overflow-x:auto;scrollbar-width:none}
    .storebar::-webkit-scrollbar{display:none}
    .store-pill{flex-shrink:0;padding:4px 13px;border-radius:20px;font-size:12px;
      font-weight:600;border:1.5px solid var(--border);background:var(--surface);
      color:var(--muted);cursor:pointer;transition:all .12s}
    .store-pill:hover{color:var(--text);border-color:#bbb}
    .store-pill.active{border-color:var(--green);color:var(--green);background:var(--green-lt)}

    /* Toolbar */
    .container{max-width:1280px;margin:0 auto;padding:1.25rem 1.5rem}
    .toolbar{display:flex;align-items:center;justify-content:space-between;
      margin-bottom:1rem;gap:8px;flex-wrap:wrap}
    .deal-count{font-size:13px;color:var(--muted)}
    .sort-wrap{display:flex;align-items:center;gap:6px}
    .sort-label{font-size:12px;color:var(--muted);white-space:nowrap}
    .sort-select{font-size:12px;padding:5px 10px;border:1px solid var(--border);
      border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;outline:none}
    .refresh-btn{font-size:12px;color:var(--muted);background:none;
      border:1px solid var(--border);border-radius:6px;padding:5px 10px;
      cursor:pointer;display:flex;align-items:center;gap:5px}
    .refresh-btn:hover{border-color:#aaa;color:var(--text)}

    /* Hot strip */
    .hot-strip{background:linear-gradient(90deg,#b30000,var(--red));
      padding:8px 1.5rem;display:flex;align-items:center;gap:10px;
      font-size:13px;color:rgba(255,255,255,.9);overflow:hidden}
    .hot-strip strong{color:#fff}
    .hot-strip .pill{background:rgba(255,255,255,.15);padding:2px 9px;
      border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

    /* Grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}

    /* Card */
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;
      text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s,transform .1s}
    .card:hover{border-color:#c5c2bb;box-shadow:0 2px 14px rgba(0,0,0,.07);transform:translateY(-1px)}

    /* Card image */
    .img-wrap{position:relative;flex-shrink:0;background:var(--bg)}
    .card-img{width:100%;height:160px;object-fit:cover;display:block}
    .img-ph{width:100%;height:160px;display:flex;align-items:center;
      justify-content:center;background:linear-gradient(135deg,#f0ede6,#e8e4dc)}
    .img-ph-txt{font-size:22px;font-weight:900;opacity:.15;letter-spacing:-.04em;text-transform:uppercase}

    /* Image badges */
    .badge-free{position:absolute;top:8px;left:8px;background:var(--gold);color:#3a1f00;
      font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.05em}
    .badge-hot{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;
      font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
    .badge-pct{position:absolute;top:8px;right:8px;background:var(--surface);color:var(--red);
      font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid var(--border)}

    /* Card body */
    .card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:6px}
    .card-top{display:flex;align-items:center;justify-content:space-between}
    .sbadge{font-size:10px;font-weight:700;letter-spacing:.03em;padding:2px 8px;
      border-radius:20px;text-transform:uppercase;flex-shrink:0}

    /* Store colours */
    .s-homedepot{background:#fff3e0;color:#bf5000}
    .s-menards{background:#e8f5e8;color:#1a6020}
    .s-lowes{background:#e0ecff;color:#0044a8}
    .s-gap{background:#eeeefd;color:#2222aa}
    .s-oldnavy{background:#ffeef8;color:#990066}
    .s-kohls{background:#fff8e0;color:#996600}
    .s-chickfila{background:#fff5e0;color:#b05c00}
    .s-starbucks{background:#e0f5ea;color:#00623a}
    .s-mcdonalds{background:#fffae0;color:#aa7700}
    .s-amazon{background:#fff4d4;color:#a05000}
    .s-bestbuy{background:#e8e8ff;color:#1515aa}
    .s-target{background:#ffe8e8;color:#bb0000}
    .s-walmart{background:#e8f4ff;color:#0060c0}
    .s-default{background:#f2f0ec;color:#66635d}

    .card-time{font-size:11px;color:var(--muted);white-space:nowrap}
    .card-title{font-size:13.5px;font-weight:600;line-height:1.45;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-desc{font-size:12px;color:var(--muted);line-height:1.6;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    .price-row{display:flex;align-items:center;gap:8px}
    .price{font-size:18px;font-weight:700;color:var(--green)}
    .savings{font-size:11px;font-weight:700;color:var(--red);
      background:var(--red-lt);padding:2px 6px;border-radius:4px}

    .card-foot{display:flex;align-items:center;justify-content:space-between;
      border-top:1px solid var(--border);padding-top:8px;margin-top:auto}
    .via{font-size:11px;color:#c0bdb6}
    .view-link{font-size:12px;font-weight:700;color:var(--green)}

    /* States */
    .state{grid-column:1/-1;text-align:center;padding:4rem 1.5rem}
    .spinner{width:28px;height:28px;border:2px solid var(--border);
      border-top-color:var(--green);border-radius:50%;
      animation:spin .7s linear infinite;margin:0 auto 1rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-box{display:inline-block;background:var(--red-lt);border:1px solid #ffb3a3;
      border-radius:var(--radius);padding:1.25rem 1.5rem;text-align:left;max-width:500px}
    .err-box strong{display:block;margin-bottom:8px}
    .err-box p{font-size:13px;color:var(--muted);line-height:1.7}
    .err-box code{background:#ffd6cc;padding:2px 5px;border-radius:3px;font-size:12px}

    /* Submit */
    .submit-wrap{max-width:520px;margin:2.5rem auto 2rem}
    .submit-card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:1.5rem}
    .submit-card h2{font-size:15px;font-weight:700;margin-bottom:4px}
    .submit-card p{font-size:12px;color:var(--muted);margin-bottom:1.1rem;line-height:1.5}
    .fields{display:flex;flex-direction:column;gap:9px}
    .fields input,.fields textarea,.fields select{width:100%;padding:9px 12px;
      border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;
      background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
    .fields input:focus,.fields textarea:focus,.fields select:focus{border-color:var(--green);background:#fff}
    .sub-btn{padding:10px;background:var(--green);color:#fff;border:none;border-radius:8px;
      font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .sub-btn:hover{opacity:.88}
    .sub-msg{font-size:12px;color:var(--muted);text-align:center;min-height:16px}

    footer{text-align:center;padding:2rem 1rem;font-size:12px;color:#bbb;
      border-top:1px solid var(--border);margin-top:1rem}

    @media(max-width:600px){
      .container{padding:1rem}
      .grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .card-img,.img-ph{height:120px}
    }
    @media(max-width:360px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <span class="logo-text">Save Your<span class="logo-dot">Dollar</span></span>
  </a>
  <div class="header-meta" id="lastUpdated">Loading…</div>
</header>

<!-- Category tabs -->
<div class="catbar">
  <button class="cat-btn active" data-cat="all"         onclick="setCat(this)">🏷️ All Deals</button>
  <button class="cat-btn"        data-cat="home"        onclick="setCat(this)">🏠 Home &amp; Hardware</button>
  <button class="cat-btn"        data-cat="clothing"    onclick="setCat(this)">👕 Clothing</button>
  <button class="cat-btn"        data-cat="food"        onclick="setCat(this)">🍔 Food &amp; Drinks</button>
  <button class="cat-btn"        data-cat="electronics" onclick="setCat(this)">💻 Electronics</button>
</div>

<!-- Store pills -->
<div class="storebar" id="storebar" style="display:none"></div>

<!-- Hot deals strip -->
<div class="hot-strip" id="hotStrip" style="display:none">
  🔥 <strong>Today's hottest:</strong> <span id="hotText"></span>
</div>

<div class="container">
  <div class="toolbar">
    <span class="deal-count" id="dealCount">&nbsp;</span>
    <div class="sort-wrap">
      <span class="sort-label">Sort by:</span>
      <select class="sort-select" id="sortSelect" onchange="loadDeals()">
        <option value="hot">🔥 Hottest first</option>
        <option value="newest">🕐 Newest first</option>
        <option value="discount">💰 Biggest discount</option>
        <option value="free">⭐ Free items first</option>
      </select>
      <button class="refresh-btn" onclick="loadDeals()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="state"><div class="spinner"></div></div>
  </div>

  <!-- Submit a deal -->
  <div class="submit-wrap">
    <div class="submit-card">
      <h2>Found a deal?</h2>
      <p>Share it with the community — it appears on the site instantly.</p>
      <div class="fields">
        <input   id="sTitle" type="text" placeholder="Deal title *"/>
        <textarea id="sDesc" placeholder="Details — promo code, expiry, how to claim…" rows="2"></textarea>
        <input   id="sUrl"   type="url"  placeholder="Direct link to the deal *"/>
        <input   id="sImg"   type="url"  placeholder="Product image URL (optional)"/>
        <select id="sCat">
          <option value="">Category</option>
          <option value="home">Home &amp; Hardware</option>
          <option value="clothing">Clothing</option>
          <option value="food">Food &amp; Drinks</option>
          <option value="electronics">Electronics</option>
          <option value="general">General</option>
        </select>
        <button class="sub-btn" onclick="submitDeal()">Submit deal →</button>
        <p class="sub-msg" id="subMsg"></p>
      </div>
    </div>
  </div>
</div>

<footer>© 2025 SaveYourDollar.com · Deals refreshed daily · <a href="mailto:hello@saveyourdollar.com" style="color:#aaa">Contact</a></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── REPLACE THESE TWO VALUES ───────────────────────────────────────────────
 const SUPABASE_URL = "https://lfghsqbldpyodnenpbnu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmZ2hzcWJsZHB5b2RuZW5wYm51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTIxMjIsImV4cCI6MjA5NTAyODEyMn0.xGrz9zs8R_b3GESuDfcAoG5P1IjxDphdAv6e0bx8NOQ";
// ──────────────────────────────────────────────────────────────────────────

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STORES = {
  all:[]
  ,home:       ["Home Depot","Menards","Lowe's"]
  ,clothing:   ["Gap","Old Navy","Kohl's"]
  ,food:       ["Chick-fil-A","Starbucks","McDonald's"]
  ,electronics:["Amazon","Best Buy","Target"]
};

const STORE_CLASS = {
  "Home Depot":"s-homedepot","Menards":"s-menards","Lowe's":"s-lowes",
  "Gap":"s-gap","Old Navy":"s-oldnavy","Kohl's":"s-kohls",
  "Chick-fil-A":"s-chickfila","Starbucks":"s-starbucks","McDonald's":"s-mcdonalds",
  "Amazon":"s-amazon","Best Buy":"s-bestbuy","Target":"s-target","Walmart":"s-walmart",
};

// Words that should never appear on the site
const SKIP_WORDS = ["book","kindle","audible","novel","paperback","hardcover",
  "ebook","audiobook","manga","comic","textbook"];

let activeCat="all", activeStore="all";

function renderPills(){
  const bar=document.getElementById("storebar");
  const stores=STORES[activeCat]||[];
  if(!stores.length){bar.style.display="none";return;}
  bar.style.display="flex";
  bar.innerHTML=`<button class="store-pill ${activeStore==="all"?"active":""}" data-s="all" onclick="setStore(this)">All</button>`
    +stores.map(s=>`<button class="store-pill ${activeStore===s?"active":""}" data-s="${s}" onclick="setStore(this)">${s}</button>`).join("");
}

function setCat(btn){
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  activeCat=btn.dataset.cat; activeStore="all";
  renderPills(); loadDeals();
}
function setStore(btn){
  document.querySelectorAll(".store-pill").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  activeStore=btn.dataset.s; loadDeals();
}

function shouldSkip(d){
  const t=(d.title||"").toLowerCase();
  return SKIP_WORDS.some(w=>t.includes(w));
}

function matchesCat(d){
  if(shouldSkip(d)) return false;
  if(activeCat==="all") return true;
  const catMatch=(d.category||"").toLowerCase()===activeCat;
  const storeMatch=(STORES[activeCat]||[]).some(s=>(d.store||"").toLowerCase()===s.toLowerCase());
  if(!catMatch&&!storeMatch) return false;
  if(activeStore==="all") return true;
  return (d.store||"").toLowerCase()===activeStore.toLowerCase();
}

// Hide >$1000 items unless 30%+ off
function passesPrice(d){
  const txt=[(d.title||""),(d.price||""),(d.discount||"")].join(" ").replace(/,/g,"");
  const prices=txt.match(/\$(\d+)/g);
  if(!prices) return true;
  const max=Math.max(...prices.map(p=>parseInt(p.slice(1))));
  if(max<1000) return true;
  const dm=txt.match(/(\d+)%/);
  return dm?parseInt(dm[1])>=30:false;
}

function timeAgo(d){
  const s=Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return "just now";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}

function discNum(d){
  const m=[(d.discount||""),(d.title||"")].join(" ").match(/(\d+)%/);
  return m?parseInt(m[1]):0;
}

function sc(store){return "sbadge "+(STORE_CLASS[store]||"s-default");}

function sortDeals(arr,method){
  const copy=[...arr];
  if(method==="hot")      return copy.sort((a,b)=>(b.hot_score||0)-(a.hot_score||0));
  if(method==="newest")   return copy.sort((a,b)=>new Date(b.posted_at)-new Date(a.posted_at));
  if(method==="discount") return copy.sort((a,b)=>discNum(b)-discNum(a));
  if(method==="free"){
    return copy.sort((a,b)=>{
      const af=/\bfree\b/i.test(a.title)?1:0;
      const bf=/\bfree\b/i.test(b.title)?1:0;
      return bf-af || (b.hot_score||0)-(a.hot_score||0);
    });
  }
  return copy;
}

function cardHtml(d){
  const free=/\bfree\b/i.test(d.title||"");
  const pct=discNum(d);
  const isHot=(d.hot_score||0)>=40;
  const lbl=d.store||"Deal";

  const img=d.image_url
    ?`<img class="card-img" src="${d.image_url}" alt="" loading="lazy"
        onerror="this.parentNode.innerHTML='<div class=\\'img-ph\\'><span class=\\'img-ph-txt\\'>${lbl.slice(0,6)}</span></div>'">`
    :`<div class="img-ph"><span class="img-ph-txt">${lbl.slice(0,6)}</span></div>`;

  const topBadge=free?`<span class="badge-free">★ FREE</span>`:isHot?`<span class="badge-hot">🔥 Hot</span>`:"";
  const pctBadge=pct>=5?`<span class="badge-pct">${pct}% OFF</span>`:"";

  const priceHtml=(d.price||d.discount)?`<div class="price-row">
    ${d.price?`<span class="price">${d.price}</span>`:""}
    ${d.discount?`<span class="savings">${d.discount}</span>`:""}
  </div>`:"";

  return `
    <a class="card" href="${d.url||"#"}" target="_blank" rel="noopener noreferrer">
      <div class="img-wrap">${img}${topBadge}${pctBadge}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="${sc(d.store)}">${d.store||"Deal"}</span>
          <span class="card-time">${timeAgo(d.posted_at)}</span>
        </div>
        <p class="card-title">${d.title||""}</p>
        ${d.description?`<p class="card-desc">${d.description}</p>`:""}
        ${priceHtml}
        <div class="card-foot">
          <span class="via">via ${d.source||"community"}</span>
          <span class="view-link">See deal →</span>
        </div>
      </div>
    </a>`;
}

async function loadDeals(){
  document.getElementById("grid").innerHTML='<div class="state"><div class="spinner"></div></div>';

  if(SUPABASE_URL==="YOUR_SUPABASE_URL"){
    document.getElementById("grid").innerHTML=`<div class="state"><div class="err-box">
      <strong>⚠️ Connect Supabase</strong>
      <p>Replace <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code> in this file.<br><br>
      Find both at: Supabase → Project Settings → API tab</p>
    </div></div>`;
    return;
  }

  const {data,error}=await sb.from("deals").select("*")
    .order("posted_at",{ascending:false}).limit(400);

  document.getElementById("lastUpdated").textContent=
    "Updated "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

  if(error){
    document.getElementById("grid").innerHTML=`<div class="state"><div class="err-box">
      <strong>⚠️ Could not load deals</strong><p>${error.message}</p>
    </div></div>`;
    return;
  }

  let filtered=(data||[]).filter(d=>matchesCat(d)&&passesPrice(d));
  const method=document.getElementById("sortSelect").value;
  filtered=sortDeals(filtered,method);

  document.getElementById("dealCount").textContent=
    filtered.length+" deal"+(filtered.length!==1?"s":"");

  // Hot strip — show top 3 hottest deal titles
  const hotOnes=sortDeals(filtered,"hot").slice(0,3).filter(d=>(d.hot_score||0)>0);
  const strip=document.getElementById("hotStrip");
  if(hotOnes.length){
    document.getElementById("hotText").textContent=
      hotOnes.map(d=>d.title.slice(0,50)+(d.title.length>50?"…":"")).join("  ·  ");
    strip.style.display="flex";
  } else {
    strip.style.display="none";
  }

  if(!filtered.length){
    document.getElementById("grid").innerHTML=`<div class="state">
      <p style="font-size:15px;font-weight:600;margin-bottom:8px">No deals in this section yet</p>
      <p style="font-size:13px;color:var(--muted)">The fetcher runs daily — check back tomorrow, or submit one below.</p>
    </div>`;
    return;
  }

  document.getElementById("grid").innerHTML=filtered.map(cardHtml).join("");
}

async function submitDeal(){
  const title=document.getElementById("sTitle").value.trim();
  const url=document.getElementById("sUrl").value.trim();
  const msg=document.getElementById("subMsg");
  if(!title||!url){msg.textContent="Title and link are required.";return;}
  msg.textContent="Submitting…";
  const{error}=await sb.from("deals").insert({
    title,url,
    description:document.getElementById("sDesc").value,
    image_url:document.getElementById("sImg").value||null,
    category:document.getElementById("sCat").value||"general",
    source:"submitted",store:"Other",
    hot_score:0,is_approved:true,
    posted_at:new Date().toISOString(),
  });
  if(error){msg.textContent="Error: "+error.message;return;}
  msg.textContent="✓ Submitted! Your deal is live.";
  ["sTitle","sDesc","sUrl","sImg"].forEach(id=>document.getElementById(id).value="");
  setTimeout(loadDeals,1500);
}

renderPills();
loadDeals();
// Auto-refresh display every 5 minutes (data refreshes daily via Railway)
setInterval(loadDeals,300000);
</script>
</body>
